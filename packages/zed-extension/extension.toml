cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.moli-code.targets.linux-x86_64]
archive = "https://registry.npmjs.org/@moli-code/moli-code/-/moli-code-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.moli-code.targets.windows-x86_64]
archive = "https://registry.npmjs.org/@moli-code/moli-code/-/moli-code-0.10.0.tgz"
cmd = "node"
